info:
  title: Salmon Stats+
  description: Salmon Stats for Splatoon 3 API documents.
  version: 4.0.0
  contact: {}
tags: []
servers: []
components:
  schemas:
    CoopStage:
      type: object
      properties:
        id:
          type: string
          example: Q29vcFN0YWdlLTE=
      required:
        - id
    ImageURL:
      type: object
      properties:
        url:
          type: string
          example: >-
            https://api.lp1.av5ja.srv.nintendo.net/resources/prod/v2/weapon_illust/8e134a80cd54f4235329493afd43ff754b367a65e460facfcca862b174754b0e_0.png
      required:
        - url
    MainWeapon:
      type: object
      properties:
        image:
          $ref: '#/components/schemas/ImageURL'
      required:
        - image
    CoopSetting:
      type: object
      properties:
        coopStage:
          $ref: '#/components/schemas/CoopStage'
        __isCoopSetting:
          type: string
          enum:
            - CoopNormalSetting
            - CoopBigRunSetting
            - CoopTeamContestSetting
        weapons:
          type: array
          items:
            $ref: '#/components/schemas/MainWeapon'
      required:
        - coopStage
        - __isCoopSetting
        - weapons
    CoopSchedule:
      type: object
      properties:
        startTime:
          format: date-time
          type: string
          example: '2023-08-27T16:00:00Z'
        endTime:
          format: date-time
          type: string
          example: '2023-08-29T08:00:00Z'
        setting:
          $ref: '#/components/schemas/CoopSetting'
      required:
        - startTime
        - endTime
        - setting
    Node:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/CoopSchedule'
      required:
        - nodes
    ScheduleGroup:
      type: object
      properties:
        regularSchedules:
          $ref: '#/components/schemas/Node'
        bigRunSchedules:
          $ref: '#/components/schemas/Node'
        teamContestSchedules:
          $ref: '#/components/schemas/Node'
      required:
        - regularSchedules
        - bigRunSchedules
        - teamContestSchedules
    DataClass:
      type: object
      properties:
        coopGroupingSchedule:
          $ref: '#/components/schemas/ScheduleGroup'
      required:
        - coopGroupingSchedule
    ScheduleCreateDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/DataClass'
      required:
        - data
    AfterGrade:
      type: object
      properties:
        id:
          type: string
          description: >-
            Base64 Encoded string. For example `Q29vcEdyYWRlLTg=` means
            `CoopGrade-8`.
          example: Q29vcEdyYWRlLTg=
      required:
        - id
    Badge:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    TextColor:
      type: object
      properties:
        a:
          type: number
          maximum: 1
          minimum: 0
        b:
          type: number
          maximum: 1
          minimum: 0
        g:
          type: number
          maximum: 1
          minimum: 0
        r:
          type: number
          maximum: 1
          minimum: 0
      required:
        - a
        - b
        - g
        - r
    Background:
      type: object
      properties:
        textColor:
          $ref: '#/components/schemas/TextColor'
        id:
          type: string
          example: TmFtZXBsYXRlQmFja2dyb3VuZC0x
      required:
        - textColor
        - id
    NamePlate:
      type: object
      properties:
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
        background:
          $ref: '#/components/schemas/Background'
      required:
        - badges
        - background
    Uniform:
      type: object
      properties:
        id:
          type: string
          example: Q29vcFVuaWZvcm0tMQ==
      required:
        - id
    PlayerResult:
      type: object
      properties:
        byname:
          type: string
        name:
          type: string
        nameId:
          type: string
        nameplate:
          $ref: '#/components/schemas/NamePlate'
        uniform:
          $ref: '#/components/schemas/Uniform'
        id:
          type: string
        species:
          type: string
          enum:
            - INKLING
            - OCTOLING
      required:
        - byname
        - name
        - nameId
        - nameplate
        - uniform
        - id
        - species
    SpecialWeapon:
      type: object
      properties:
        weaponId:
          type: number
          enum:
            - -1
            - 1
            - 20006
            - 20007
            - 20009
            - 20010
            - 20012
            - 20013
            - 20014
            - 20101
      required:
        - weaponId
    MemberResult:
      type: object
      properties:
        player:
          $ref: '#/components/schemas/PlayerResult'
        weapons:
          type: array
          items:
            $ref: '#/components/schemas/MainWeapon'
        specialWeapon:
          $ref: '#/components/schemas/SpecialWeapon'
        defeatEnemyCount:
          type: integer
          minimum: 0
        deliverCount:
          type: integer
          minimum: 0
        goldenAssistCount:
          type: integer
          minimum: 0
        goldenDeliverCount:
          type: integer
          minimum: 0
        rescueCount:
          type: integer
          minimum: 0
        rescuedCount:
          type: integer
          minimum: 0
      required:
        - player
        - weapons
        - specialWeapon
        - defeatEnemyCount
        - deliverCount
        - goldenAssistCount
        - goldenDeliverCount
        - rescueCount
        - rescuedCount
    KingSalmonId:
      type: object
      properties:
        id:
          type: string
          example: Q29vcEVuZW15LTIz
      required:
        - id
    BossResult:
      type: object
      properties:
        hasDefeatBoss:
          type: boolean
        boss:
          $ref: '#/components/schemas/KingSalmonId'
      required:
        - hasDefeatBoss
        - boss
    CoopEnemy:
      type: object
      properties:
        id:
          type: string
          example: Q29vcEVuZW15LTQ=
      required:
        - id
    EnemyResult:
      type: object
      properties:
        defeatCount:
          type: integer
          minimum: 0
        teamDefeatCount:
          type: integer
          minimum: 0
        popCount:
          type: integer
          minimum: 1
        enemy:
          $ref: '#/components/schemas/CoopEnemy'
      required:
        - defeatCount
        - teamDefeatCount
        - popCount
        - enemy
    EventWave:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    SpecialWeaponUsage:
      type: object
      properties:
        id:
          type: number
          enum:
            - -1
            - 1
            - 20006
            - 20007
            - 20009
            - 20010
            - 20012
            - 20013
            - 20014
            - 20101
      required:
        - id
    WaveResult:
      type: object
      properties:
        waterLevel:
          type: number
          enum:
            - 0
            - 1
            - 2
        eventWave:
          $ref: '#/components/schemas/EventWave'
        deliverNorm:
          type: integer
          minimum: 0
          nullable: true
        goldenPopCount:
          type: integer
          minimum: 0
        teamDeliverCount:
          type: integer
          minimum: 0
          nullable: true
        specialWeapons:
          nullable: false
          type: array
          items:
            $ref: '#/components/schemas/SpecialWeaponUsage'
            maximum: 8
            minimum: 0
        waveNumber:
          type: integer
          minimum: 0
      required:
        - waterLevel
        - eventWave
        - deliverNorm
        - goldenPopCount
        - teamDeliverCount
        - specialWeapons
        - waveNumber
    Scale:
      type: object
      properties:
        gold:
          type: integer
        bronze:
          type: integer
        silver:
          type: integer
      required:
        - gold
        - bronze
        - silver
    CoopHistoryDetail:
      type: object
      properties:
        id:
          type: string
        afterGrade:
          $ref: '#/components/schemas/AfterGrade'
        myResult:
          $ref: '#/components/schemas/MemberResult'
        memberResults:
          maxItems: 3
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/MemberResult'
        bossResult:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/BossResult'
        enemyResults:
          maxItems: 14
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/EnemyResult'
        waveResults:
          maxItems: 5
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/WaveResult'
        resultWave:
          type: integer
          maximum: 5
          minimum: -1
        playedTime:
          format: date-time
          type: string
        rule:
          type: string
          enum:
            - REGULAR
            - BIG_RUN
            - TEAM_CONTEST
        coopStage:
          $ref: '#/components/schemas/CoopStage'
        dangerRate:
          type: number
          maximum: 3.33
          minimum: 0
        scenarioCode:
          type: string
          nullable: true
        smellMeter:
          type: integer
          maximum: 5
          minimum: 0
          nullable: true
        weapons:
          maxItems: 4
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/MainWeapon'
        afterGradePoint:
          type: integer
          maximum: 999
          minimum: 0
          nullable: true
        scale:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Scale'
        jobPoint:
          type: integer
          minimum: 0
          nullable: true
        jobScore:
          type: integer
          minimum: 0
          nullable: true
        jobRate:
          type: number
          minimum: 0
          nullable: true
        jobBonus:
          type: integer
          minimum: 0
          nullable: true
      required:
        - id
        - afterGrade
        - myResult
        - memberResults
        - bossResult
        - enemyResults
        - waveResults
        - resultWave
        - playedTime
        - rule
        - coopStage
        - dangerRate
        - scenarioCode
        - smellMeter
        - weapons
        - afterGradePoint
        - scale
        - jobPoint
        - jobScore
        - jobRate
        - jobBonus
    CoopResultDataClass:
      type: object
      properties:
        coopHistoryDetail:
          $ref: '#/components/schemas/CoopHistoryDetail'
      required:
        - coopHistoryDetail
    ResultCreateDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CoopResultDataClass'
      required:
        - data
    UserCreateDto:
      type: object
      properties:
        id:
          type: string
          example: laT7IetjzweGKWkNwrd162iO5wt2
        name:
          type: string
          example: '@tkgling'
      required:
        - id
        - name
    CoopResult:
      type: object
      properties:
        historyGroups:
          $ref: '#/components/schemas/Node'
      required:
        - historyGroups
    CoopHistoryDataClass:
      type: object
      properties:
        coopResult:
          $ref: '#/components/schemas/CoopResult'
      required:
        - coopResult
    HistoryCreateDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CoopHistoryDataClass'
      required:
        - data
