info:
  title: av5ja_stats_api
  description: Salmon Stats for Splatoon 3 API documents.
  version: 4.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    CoopStage:
      type: object
      properties:
        id:
          type: string
          example: Q29vcFN0YWdlLTE=
      required:
        - id
    ImageURL:
      type: object
      properties:
        url:
          type: string
          example: >-
            https://api.lp1.av5ja.srv.nintendo.net/resources/prod/v2/weapon_illust/8e134a80cd54f4235329493afd43ff754b367a65e460facfcca862b174754b0e_0.png
      required:
        - url
    MainWeapon:
      type: object
      properties:
        image:
          $ref: '#/components/schemas/ImageURL'
      required:
        - image
    CoopSetting:
      type: object
      properties:
        coopStage:
          $ref: '#/components/schemas/CoopStage'
        __isCoopSetting:
          type: string
          enum:
            - CoopNormalSetting
            - CoopBigRunSetting
            - CoopTeamContestSetting
        weapons:
          type: array
          items:
            $ref: '#/components/schemas/MainWeapon'
      required:
        - coopStage
        - __isCoopSetting
        - weapons
    CoopSchedule:
      type: object
      properties:
        startTime:
          format: date-time
          type: string
          example: '2023-08-27T16:00:00Z'
        endTime:
          format: date-time
          type: string
          example: '2023-08-29T08:00:00Z'
        setting:
          $ref: '#/components/schemas/CoopSetting'
      required:
        - startTime
        - endTime
        - setting
    Node:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/CoopSchedule'
      required:
        - nodes
    ScheduleGroup:
      type: object
      properties:
        regularSchedules:
          $ref: '#/components/schemas/Node'
        bigRunSchedules:
          $ref: '#/components/schemas/Node'
        teamContestSchedules:
          $ref: '#/components/schemas/Node'
      required:
        - regularSchedules
        - bigRunSchedules
        - teamContestSchedules
    DataClass:
      type: object
      properties:
        coopGroupingSchedule:
          $ref: '#/components/schemas/ScheduleGroup'
      required:
        - coopGroupingSchedule
    Request:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CoopHistoryDataClass'
      required:
        - data
    Paginated:
      type: object
      properties:
        results:
          deprecated: true
          type: array
          items:
            $ref: '#/components/schemas/Request'
      required:
        - results
    CoopHistoryNode:
      type: object
      properties:
        nodes:
          $ref: '#/components/schemas/CoopSchedule'
      required:
        - nodes
    CoopHistoryGroup:
      type: object
      properties:
        historyGroups:
          $ref: '#/components/schemas/CoopHistoryNode'
      required:
        - historyGroups
    CoopHistoryDataClass:
      type: object
      properties:
        coopResult:
          $ref: '#/components/schemas/CoopHistoryGroup'
      required:
        - coopResult
