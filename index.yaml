info:
  title: av5ja_stats_api
  description: Salmon Stats for Splatoon 3 API documents.
  version: 4.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    CoopStage:
      type: object
      properties:
        id:
          type: string
          example: Q29vcFN0YWdlLTE=
      required:
        - id
    ImageURL:
      type: object
      properties:
        url:
          type: string
          example: >-
            https://api.lp1.av5ja.srv.nintendo.net/resources/prod/v2/weapon_illust/8e134a80cd54f4235329493afd43ff754b367a65e460facfcca862b174754b0e_0.png
      required:
        - url
    MainWeapon:
      type: object
      properties:
        image:
          $ref: '#/components/schemas/ImageURL'
      required:
        - image
    CoopSetting:
      type: object
      properties:
        coopStage:
          $ref: '#/components/schemas/CoopStage'
        bossId:
          type: number
        __isCoopSetting:
          type: string
          enum:
            - CoopNormalSetting
            - CoopBigRunSetting
            - CoopTeamContestSetting
        weapons:
          type: array
          items:
            $ref: '#/components/schemas/MainWeapon'
      required:
        - coopStage
        - bossId
        - __isCoopSetting
        - weapons
    CoopSchedule:
      type: object
      properties:
        startTime:
          format: date-time
          type: string
          example: '2023-08-27T16:00:00Z'
        endTime:
          format: date-time
          type: string
          example: '2023-08-29T08:00:00Z'
        setting:
          $ref: '#/components/schemas/CoopSetting'
      required:
        - startTime
        - endTime
        - setting
    Node:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/CoopSchedule'
      required:
        - nodes
    ScheduleGroup:
      type: object
      properties:
        regularSchedules:
          $ref: '#/components/schemas/Node'
        bigRunSchedules:
          $ref: '#/components/schemas/Node'
        teamContestSchedules:
          $ref: '#/components/schemas/Node'
      required:
        - regularSchedules
        - bigRunSchedules
        - teamContestSchedules
    DataClass:
      type: object
      properties:
        coopGroupingSchedule:
          $ref: '#/components/schemas/ScheduleGroup'
      required:
        - coopGroupingSchedule
    Request:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/DataClass'
      required:
        - data
    ScheduleDto:
      type: object
      properties:
        id:
          type: string
        startTime:
          format: date-time
          type: string
        endTime:
          format: date-time
          type: string
        stageId:
          type: number
        bossId:
          type: number
        weaponList:
          type: array
          items:
            type: string
        mode:
          type: string
        rule:
          type: string
      required:
        - id
        - startTime
        - endTime
        - stageId
        - bossId
        - weaponList
        - mode
        - rule
    StageScheduleQuery:
      type: object
      properties: {}
    AfterGrade:
      type: object
      properties:
        id:
          type: string
          description: >-
            Base64 Encoded string. For example `Q29vcEdyYWRlLTg=` means
            `CoopGrade-8`.
          example: Q29vcEdyYWRlLTg=
          nullable: true
      required:
        - id
    Badge:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    TextColor:
      type: object
      properties:
        a:
          type: number
          maximum: 1
          minimum: 0
        b:
          type: number
          maximum: 1
          minimum: 0
        g:
          type: number
          maximum: 1
          minimum: 0
        r:
          type: number
          maximum: 1
          minimum: 0
      required:
        - a
        - b
        - g
        - r
    Background:
      type: object
      properties:
        textColor:
          $ref: '#/components/schemas/TextColor'
        id:
          type: string
          example: TmFtZXBsYXRlQmFja2dyb3VuZC0x
      required:
        - textColor
        - id
    NamePlate:
      type: object
      properties:
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
        background:
          $ref: '#/components/schemas/Background'
      required:
        - badges
        - background
    Uniform:
      type: object
      properties:
        id:
          type: string
          example: Q29vcFVuaWZvcm0tMQ==
      required:
        - id
    PlayerResult:
      type: object
      properties:
        byname:
          type: string
        name:
          type: string
        nameId:
          type: string
        nameplate:
          $ref: '#/components/schemas/NamePlate'
        uniform:
          $ref: '#/components/schemas/Uniform'
        id:
          type: string
        species:
          type: string
          enum:
            - INKLING
            - OCTOLING
      required:
        - byname
        - name
        - nameId
        - nameplate
        - uniform
        - id
        - species
    SpecialWeapon:
      type: object
      properties:
        weaponId:
          type: number
          enum:
            - -1
            - 1
            - 20006
            - 20007
            - 20009
            - 20010
            - 20012
            - 20013
            - 20014
            - 20017
            - 20018
            - 20101
      required:
        - weaponId
    MemberResult:
      type: object
      properties:
        player:
          $ref: '#/components/schemas/PlayerResult'
        weapons:
          type: array
          items:
            $ref: '#/components/schemas/MainWeapon'
        specialWeapon:
          $ref: '#/components/schemas/SpecialWeapon'
        bossKillCountsTotal:
          type: integer
          minimum: 0
        ikuraNum:
          type: integer
          minimum: 0
        goldenIkuraAssistNum:
          type: integer
          minimum: 0
        goldenIkuraNum:
          type: integer
          minimum: 0
        helpCount:
          type: integer
          minimum: 0
        deadCount:
          type: integer
          minimum: 0
      required:
        - player
        - weapons
        - specialWeapon
        - bossKillCountsTotal
        - ikuraNum
        - goldenIkuraAssistNum
        - goldenIkuraNum
        - helpCount
        - deadCount
    KingSalmonId:
      type: object
      properties:
        id:
          type: string
          example: Q29vcEVuZW15LTIz
      required:
        - id
    BossResult:
      type: object
      properties:
        hasDefeatBoss:
          type: boolean
        boss:
          $ref: '#/components/schemas/KingSalmonId'
      required:
        - hasDefeatBoss
        - boss
    CoopEnemy:
      type: object
      properties:
        id:
          type: string
          example: Q29vcEVuZW15LTQ=
      required:
        - id
    EnemyResult:
      type: object
      properties:
        defeatCount:
          type: integer
          minimum: 0
        teamDefeatCount:
          type: integer
          minimum: 0
        popCount:
          type: integer
          minimum: 1
        enemy:
          $ref: '#/components/schemas/CoopEnemy'
      required:
        - defeatCount
        - teamDefeatCount
        - popCount
        - enemy
    EventWave:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    SpecialWeaponUsage:
      type: object
      properties:
        id:
          type: number
          enum:
            - -1
            - 1
            - 20006
            - 20007
            - 20009
            - 20010
            - 20012
            - 20013
            - 20014
            - 20017
            - 20018
            - 20101
      required:
        - id
    WaveResult:
      type: object
      properties:
        waterLevel:
          type: number
          enum:
            - 0
            - 1
            - 2
        eventWave:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/EventWave'
        quotaNum:
          type: integer
          minimum: 0
          nullable: true
        goldenIkuraPopNum:
          type: integer
          minimum: 0
        goldenIkuraNum:
          type: integer
          minimum: 0
          nullable: true
        specialWeapons:
          nullable: false
          type: array
          items:
            $ref: '#/components/schemas/SpecialWeaponUsage'
            maximum: 8
            minimum: 0
        id:
          type: integer
          minimum: 0
      required:
        - waterLevel
        - eventWave
        - quotaNum
        - goldenIkuraPopNum
        - goldenIkuraNum
        - specialWeapons
        - id
    Scale:
      type: object
      properties:
        gold:
          type: integer
          nullable: true
        bronze:
          type: integer
          nullable: true
        silver:
          type: integer
          nullable: true
      required:
        - gold
        - bronze
        - silver
    CoopHistoryDetail:
      type: object
      properties: {}
    CoopResultDataClass:
      type: object
      properties:
        coopHistoryDetail:
          $ref: '#/components/schemas/CoopHistoryDetail'
      required:
        - coopHistoryDetail
    CoopHistoryNode:
      type: object
      properties:
        nodes:
          $ref: '#/components/schemas/CoopSchedule'
      required:
        - nodes
    CoopPointCard:
      type: object
      properties:
        defeatBossCount:
          type: number
        deliverCount:
          type: number
        goldenDeliverCount:
          type: number
        limitedPoint:
          type: number
        playCount:
          type: number
        regularPoint:
          type: number
        rescueCount:
          type: number
        totalPoint:
          type: number
      required:
        - defeatBossCount
        - deliverCount
        - goldenDeliverCount
        - limitedPoint
        - playCount
        - regularPoint
        - rescueCount
        - totalPoint
    CoopHistoryGroup:
      type: object
      properties:
        historyGroups:
          $ref: '#/components/schemas/CoopHistoryNode'
        pointCard:
          $ref: '#/components/schemas/CoopPointCard'
      required:
        - historyGroups
        - pointCard
    CoopHistoryDataClass:
      type: object
      properties:
        coopResult:
          $ref: '#/components/schemas/CoopHistoryGroup'
      required:
        - coopResult
    CoopHistoryQuery:
      type: object
      properties: {}
    Version:
      type: object
      properties:
        version:
          type: string
          default: 2.7.0
        web_version:
          type: string
          default: 4.0.0-dae4328c
      required:
        - version
        - web_version
    StageImg:
      type: object
      properties:
        banner:
          type: array
          items:
            type: string
        icon:
          type: array
          items:
            type: string
      required:
        - banner
        - icon
    Resource:
      type: object
      properties:
        coop_enemy_img:
          type: array
          items:
            type: string
        stage_img:
          $ref: '#/components/schemas/StageImg'
        scale_img:
          type: array
          items:
            type: string
        weapon_illust:
          type: array
          items:
            type: string
        ui_img:
          type: array
          items:
            type: string
        special_img:
          type: array
          items:
            type: string
      required:
        - coop_enemy_img
        - stage_img
        - scale_img
        - weapon_illust
        - ui_img
        - special_img
    Response:
      type: object
      properties: {}
