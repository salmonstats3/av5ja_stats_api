version: '3.9'

services:
  postgres:
    image: postgres:16.0
    ports:
      - 5432:5432
    container_name: salmon_stats_db
    volumes:
      - ./postgresql/init:/docker-entrypoint-initdb.d
    shm_size: 4g
    environment:
      DATABASE_URL: $DATABASE_URL
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: $POSTGRES_USER
