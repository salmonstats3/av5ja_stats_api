version: '3.9'

services:
  app:
    image: tkgling/salmon_stats_app:latest
    container_name: salmon_stats_app
    ports:
      - $OPENAPI_PORT:$OPENAPI_PORT
    environment:
      NODE_ENV: production
      DATABASE_URL: $DATABASE_URL
      API_JWT_SECRET_KEY: $API_JWT_SECRET_KEY
      API_PASSWORD_SALT: $API_PASSWORD_SALT
      OPENAPI_VERSION: $OPENAPI_VERSION
      OPENAPI_PORT: $OPENAPI_PORT
      OPENAPI_HOST: $OPENAPI_HOST

  db:
    image: postgres:16.0
    ports:
      - 5432:5432
    container_name: salmon_stats_db
    volumes:
      - ./postgresql/init:/docker-entrypoint-initdb.d
    shm_size: 4g
    environment:
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: $POSTGRES_USER
